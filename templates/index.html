<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossfade.fm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 8px;
            color: #ffffff;
        }

        h1 span {
            color: #d4145a;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .songs-container {
            display: flex;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto 30px auto;
            flex-wrap: wrap;
        }

        .song-box {
            flex: 1;
            min-width: 280px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a2a;
        }

        .song-box h3 {
            margin-bottom: 12px;
            color: #d4145a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #d4145a;
        }

        .search-results {
            margin-top: 8px;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }

        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #3a3a3a;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #3a3a3a;
        }

        .result-track {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-artist {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }

        .selected-song {
            margin-top: 12px;
            padding: 10px 14px;
            background: #d4145a22;
            border: 1px solid #d4145a55;
            border-radius: 8px;
            display: none;
        }

        .selected-song .result-track {
            color: #d4145a;
        }

        .controls {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .size-selector {
            display: flex;
            gap: 10px;
        }

        .size-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background: #1a1a1a;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .size-btn.active {
            background: #d4145a;
            border-color: #d4145a;
            color: #ffffff;
        }

        .generate-btn {
            padding: 12px 32px;
            background: #d4145a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: auto;
        }

        .generate-btn:hover {
            background: #b01048;
        }

        .generate-btn:disabled {
            background: #3a3a3a;
            color: #666;
            cursor: not-allowed;
        }

        .tags-section {
            max-width: 900px;
            margin: 0 auto 30px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a2a;
            display: none;
        }

        .tags-section h3 {
            margin-bottom: 14px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .tags-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tags-group {
            flex: 1;
            min-width: 200px;
        }

        .tags-group h4 {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #2a2a2a;
            color: #aaa;
        }

        .tag.common {
            background: #d4145a22;
            color: #d4145a;
            border: 1px solid #d4145a44;
        }

        .playlist-section {
            max-width: 900px;
            margin: 0 auto;
            display: none;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .playlist-header h2 {
            font-size: 1.2rem;
        }

        .playlist-count {
            font-size: 0.85rem;
            color: #888;
        }

        .track-item {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 10px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }

        .track-item:hover {
            border-color: #d4145a44;
        }

        .track-number {
            color: #555;
            font-size: 0.85rem;
            min-width: 24px;
            text-align: center;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .track-artist {
            color: #888;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .listen-links {
            display: flex;
            gap: 8px;
        }

        .listen-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .listen-btn:hover {
            opacity: 0.8;
        }

        .btn-spotify {
            background: #1DB954;
            color: #000;
        }

        .btn-apple {
            background: #fc3c44;
            color: #fff;
        }

        .btn-youtube {
            background: #FF0000;
            color: #fff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            display: none;
        }

        .error {
            text-align: center;
            padding: 20px;
            color: #d4145a;
            display: none;
        }

        .divider {
            text-align: center;
            color: #d4145a;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 30px;
        }
    </style>
</head>

<body>

    <h1>Cross<span>fade</span>.fm</h1>
    <p class="subtitle">Pick 2 songs. We find everything in between.</p>

    <div class="songs-container">
        <div class="song-box">
            <h3>Song 1</h3>
            <input type="text" class="search-input" id="search1" placeholder="Search for a song..." autocomplete="off">
            <div class="search-results" id="results1"></div>
            <div class="selected-song" id="selected1">
                <div class="result-track" id="selected1-track"></div>
                <div class="result-artist" id="selected1-artist"></div>
            </div>
        </div>

        <div class="divider">⇄</div>

        <div class="song-box">
            <h3>Song 2</h3>
            <input type="text" class="search-input" id="search2" placeholder="Search for a song..." autocomplete="off">
            <div class="search-results" id="results2"></div>
            <div class="selected-song" id="selected2">
                <div class="result-track" id="selected2-track"></div>
                <div class="result-artist" id="selected2-artist"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="size-selector">
            <button class="size-btn active" data-size="10">10 Songs</button>
            <button class="size-btn" data-size="20">20 Songs</button>
        </div>
        <button class="generate-btn" id="generateBtn" disabled>Generate Playlist</button>
    </div>

    <div class="tags-section" id="tagsSection">
        <h3>Vibe Analysis</h3>
        <div class="tags-row">
            <div class="tags-group">
                <h4>Common Vibes</h4>
                <div class="tags-list" id="commonTags"></div>
            </div>
            <div class="tags-group">
                <h4>Song 1 Vibes</h4>
                <div class="tags-list" id="song1Tags"></div>
            </div>
            <div class="tags-group">
                <h4>Song 2 Vibes</h4>
                <div class="tags-list" id="song2Tags"></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">Analyzing your songs and finding the crossfade...</div>
    <div class="error" id="error"></div>

    <div class="playlist-section" id="playlistSection">
        <div class="playlist-header">
            <h2>Your Playlist</h2>
            <span class="playlist-count" id="playlistCount"></span>
        </div>
        <div id="playlistTracks"></div>
    </div>

    <script>
        let selectedSong1 = null;
        let selectedSong2 = null;
        let playlistSize = 10;
        let searchTimeout = null;

        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                playlistSize = parseInt(btn.dataset.size);
            });
        });

        function setupSearch(inputId, resultsId, selectedId, songNum) {
            const input = document.getElementById(inputId);
            const results = document.getElementById(resultsId);

            input.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                const query = input.value.trim();
                if (query.length < 2) {
                    results.style.display = 'none';
                    return;
                }
                searchTimeout = setTimeout(() => searchTrack(query, resultsId, selectedId, songNum), 400);
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !results.contains(e.target)) {
                    results.style.display = 'none';
                }
            });
        }

        async function searchTrack(query, resultsId, selectedId, songNum) {
            const results = document.getElementById(resultsId);
            try {
                const response = await fetch(`/search_track?q=${encodeURIComponent(query)}`);
                const tracks = await response.json();
                results.innerHTML = '';
                if (tracks.length === 0) {
                    results.style.display = 'none';
                    return;
                }
                tracks.forEach(track => {
                    const item = document.createElement('div');
                    item.className = 'search-result-item';
                    item.innerHTML = `
                        <div class="result-track">${track.name}</div>
                        <div class="result-artist">${track.artist}</div>
                    `;
                    item.addEventListener('click', () => selectSong(track, selectedId, resultsId, songNum));
                    results.appendChild(item);
                });
                results.style.display = 'block';
            } catch (err) {
                console.error(err);
            }
        }

        function selectSong(track, selectedId, resultsId, songNum) {
            const selected = document.getElementById(selectedId);
            document.getElementById(selectedId + '-track').textContent = track.name;
            document.getElementById(selectedId + '-artist').textContent = track.artist;
            selected.style.display = 'block';
            document.getElementById(resultsId).style.display = 'none';

            if (songNum === 1) {
                selectedSong1 = { track: track.name, artist: track.artist };
                document.getElementById('search1').value = track.name;
            } else {
                selectedSong2 = { track: track.name, artist: track.artist };
                document.getElementById('search2').value = track.name;
            }
            checkGenerateButton();
        }

        function checkGenerateButton() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = !(selectedSong1 && selectedSong2);
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const playlistSection = document.getElementById('playlistSection');
            const tagsSection = document.getElementById('tagsSection');

            loading.style.display = 'block';
            error.style.display = 'none';
            playlistSection.style.display = 'none';
            tagsSection.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        song1: selectedSong1,
                        song2: selectedSong2,
                        size: playlistSize
                    })
                });

                const data = await response.json();
                loading.style.display = 'none';

                renderTags(data.tags);
                renderPlaylist(data.playlist);

            } catch (err) {
                loading.style.display = 'none';
                error.textContent = 'Something went wrong. Please try again.';
                error.style.display = 'block';
            }
        });

        function renderTags(tags) {
            const tagsSection = document.getElementById('tagsSection');
            const commonEl = document.getElementById('commonTags');
            const song1El = document.getElementById('song1Tags');
            const song2El = document.getElementById('song2Tags');

            const noDataMsg = '<span style="color:#555;font-size:0.8rem;">Not enough data yet — try a more established track</span>';

            commonEl.innerHTML = tags.common.length ? tags.common.map(t => `<span class="tag common">${t}</span>`).join('') : noDataMsg;
            song1El.innerHTML = tags.song1_unique.length ? tags.song1_unique.map(t => `<span class="tag">${t}</span>`).join('') : noDataMsg;
            song2El.innerHTML = tags.song2_unique.length ? tags.song2_unique.map(t => `<span class="tag">${t}</span>`).join('') : noDataMsg;

            tagsSection.style.display = 'block';
        }

        function renderPlaylist(playlist) {
            const section = document.getElementById('playlistSection');
            const tracksEl = document.getElementById('playlistTracks');
            const countEl = document.getElementById('playlistCount');

            countEl.textContent = `${playlist.length} tracks`;
            tracksEl.innerHTML = playlist.map((track, i) => `
                <div class="track-item">
                    <div class="track-number">${i + 1}</div>
                    <div class="track-info">
                        <div class="track-name">${track.track}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <div class="listen-links">
                        <a href="${track.spotify_url}" target="_blank" class="listen-btn btn-spotify">Spotify</a>
                        <a href="${track.apple_music_url}" target="_blank" class="listen-btn btn-apple">Apple</a>
                        <a href="${track.youtube_music_url}" target="_blank" class="listen-btn btn-youtube">YouTube</a>
                    </div>
                </div>
            `).join('');

            section.style.display = 'block';
        }

        setupSearch('search1', 'results1', 'selected1', 1);
        setupSearch('search2', 'results2', 'selected2', 2);
    </script>
</body>

</html>
